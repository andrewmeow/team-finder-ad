name: TeamFinder CI/CD

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: team_finder_db
          POSTGRES_USER: team_finder_user
          POSTGRES_PASSWORD: team_finder_pass
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.0
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: "ci-test-secret-key"
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: "localhost 127.0.0.1 web"
          POSTGRES_DB: team_finder_db
          POSTGRES_USER: team_finder_user
          POSTGRES_PASSWORD: team_finder_pass
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
        run: |
          python manage.py test

  build_and_push:
    name: Build and push Docker image to Docker Hub
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/teamfinder_backend:latest

  send_telegram_message:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Notify Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "TeamFinder: образ ${{ secrets.DOCKER_USERNAME }}/teamfinder_backend:latest успешно загружен в Docker Hub."